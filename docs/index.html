<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chaithu Contribution</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    section {
      margin: 50px auto;
      padding: 30px;
      width: 60%;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    p {
      font-size: 1.2rem;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.4);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #ff7eb3;
      color: white;
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4e91;
      transform: scale(1.05);
    }
  </style>

</head>
<body>

<header>
  <h1>🚀 Welcome to My Open Source Contribution</h1>
</header>

<section>
  <p>This is my first real HTML contribution.</p>
  <p>I am learning GitHub, Open Source, and Web Development 💻</p>

  <a href="#" class="btn">Explore More</a>
</section>

<footer>
  <p>✨ Created by Chaithu ✨</p>
</footer>

</body>
</html>
