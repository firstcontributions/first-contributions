name: Markdown Validator

on:
  push:
    paths:
      - "**.md"
      - "docs/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run Validator
        run: python scripts/markdown_validator.py
