name: Validate and merge contributor PRs

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
    paths:
      - Contributors.md

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-and-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Validate contribution and merge
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- first-contributions-auto-merge -->';
            const { owner, repo } = context.repo;
            const pullNumber = context.payload.pull_request.number;
            const pullRequest = context.payload.pull_request;

            async function upsertFeedback(body) {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pullNumber, per_page: 100 }
              );
              const existing = comments.find(comment =>
                comment.user.type === 'Bot' && comment.body?.includes(marker)
              );
              const markedBody = `${marker}\n${body}`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: markedBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pullNumber,
                  body: markedBody
                });
              }
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pullNumber, per_page: 100 }
            );
            const contributorFile = files.find(file => file.filename === 'Contributors.md');
            const onlyContributorFile = files.length === 1 && contributorFile;

            if (!onlyContributorFile) {
              const changedFiles = files.map(file => `- \`${file.filename}\``).join('\n');
              await upsertFeedback(
                `### Maintainer review needed\n\n` +
                `Hi @${pullRequest.user.login}, this pull request changes files other than ` +
                `\`Contributors.md\`, so it won't be merged automatically. A maintainer will review it.\n\n` +
                `Changed files:\n${changedFiles}`
              );
              return;
            }

            const addedLines = (contributorFile.patch || '')
              .split('\n')
              .filter(line => line.startsWith('+') && !line.startsWith('+++'))
              .map(line => line.slice(1));
            const contributorPattern = /^-\s+\[[^\]\r\n]+\]\(https:\/\/github\.com\/[A-Za-z0-9](?:[A-Za-z0-9-]{0,38})(?:\/)?\)\s*$/;
            const isOneValidEntry =
              contributorFile.additions === 1 &&
              contributorFile.deletions === 0 &&
              addedLines.length === 1 &&
              contributorPattern.test(addedLines[0]);

            if (!isOneValidEntry) {
              await upsertFeedback(
                `### Please update your contribution\n\n` +
                `Hi @${pullRequest.user.login}, this exercise expects exactly one new line in ` +
                `\`Contributors.md\` and no removed lines. Use this format:\n\n` +
                '```markdown\n- [Your Name](https://github.com/your-github-username)\n```\n\n' +
                `Push the correction to the same branch. This check will run again automatically; ` +
                `you don't need to open another pull request.`
              );
              core.setFailed('The pull request must add exactly one valid contributor entry.');
              return;
            }

            const latest = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber
            });

            if (latest.data.mergeable === false || latest.data.mergeable_state === 'dirty') {
              await postConflictFeedback();
              core.setFailed('The pull request has a merge conflict.');
              return;
            }

            async function postConflictFeedback() {
              await upsertFeedback(
                `### Update needed: merge conflict\n\n` +
                `Hi @${pullRequest.user.login}, your contributor entry is valid, but another ` +
                `contribution was merged into \`main\` and this pull request now has a conflict. ` +
                `Update your branch with these commands:\n\n` +
                '```bash\n' +
                'git remote add upstream https://github.com/firstcontributions/first-contributions.git\n' +
                'git fetch upstream\n' +
                `git checkout ${pullRequest.head.ref}\n` +
                'git merge upstream/main\n' +
                '```\n\n' +
                `Open \`Contributors.md\`, remove the \`<<<<<<<\`, \`=======\`, and ` +
                `\`>>>>>>>\` markers, and keep both contributors' entries. Then run:\n\n` +
                '```bash\n' +
                'git add Contributors.md\n' +
                'git commit -m "Resolve Contributors.md conflict"\n' +
                `git push origin ${pullRequest.head.ref}\n` +
                '```\n\n' +
                `This check will run again automatically. You don't need to open another pull request. ` +
                `For more detail, see the [merge conflict guide]` +
                `(https://github.com/firstcontributions/first-contributions/blob/main/docs/additional-material/git_workflow_scenarios/resolving-merge-conflicts.md).`
              );
            }

            try {
              const result = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pullNumber,
                merge_method: 'squash',
                sha: pullRequest.head.sha
              });

              if (!result.data.merged) {
                throw new Error(result.data.message || 'GitHub did not merge the pull request.');
              }

              await upsertFeedback(
                `### Contribution merged\n\n` +
                `Congratulations @${pullRequest.user.login}! Your contributor entry passed the ` +
                `automated checks and has been merged.`
              );
            } catch (error) {
              const refreshed = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber
              });

              if (refreshed.data.mergeable === false || refreshed.data.mergeable_state === 'dirty') {
                await postConflictFeedback();
                core.setFailed('The pull request developed a merge conflict.');
                return;
              }

              await upsertFeedback(
                `### Maintainer review needed\n\n` +
                `Your contributor entry passed validation, but GitHub couldn't merge it ` +
                `automatically. A maintainer will review the pull request.`
              );
              throw error;
            }