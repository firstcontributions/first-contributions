name: Auto-merge PRs
on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - 'Contributors.md'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      
    steps:
      # Check out the repository code cleanly
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check if PR only modifies Contributors.md and number of changes
        id: is_only_contributors_file_changed
        uses: actions/github-script@v8
        with: 
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const filenames = files.map(f => f.filename);
            const isOnlyContributors = filenames.length === 1 && filenames[0] === 'Contributors.md';

            const { additions, deletions } = context.payload.pull_request;
            const isLinesChangedUnderThreshod = (additions < 5 && deletions < 4);

            core.setOutput('only_contributors', isOnlyContributors && isLinesChangedUnderThreshod);
            core.setOutput('filenames', filenames.join(', '));

            const moreLineChanged = (isOnlyContributors && !isLinesChangedUnderThreshod);

            core.setOutput('isMultipleLineChanged', moreLineChanged);
            core.setOutput('isMultipleFilesChanged', !isOnlyContributors);
            
            if (!isOnlyContributors) {
              console.log(`Validation Failed: Files changed: ${filenames.join(', ')}`);
            }

      # Merge the pull request if validation passes
      - name: Merge PR
        id: merge_pr
        if: steps.is_only_contributors_file_changed.outputs.only_contributors == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const username = pr.user.login;

            try {
              const response = await github.rest.pulls.merge({
                owner: owner,
                repo: repo,
                pull_number: pr.number,
                merge_method: "squash"
              });

              if (response.status === 200) {
                const celebrationGifs = [
                  'https://c.tenor.com/ZCq4SwgCfxAAAAAC/snoopy-peanuts.gif',
                  'https://c.tenor.com/Z0ojZS2kpO0AAAAC/milk-and-mocha-happy.gif',
                  'https://c.tenor.com/LffD4a8ET9AAAAAC/heart-celebrate.gif',
                  'https://c.tenor.com/HJ0iSKwIG28AAAAC/yes-baby.gif',
                  'https://c.tenor.com/4blWuIh5MIYAAAAC/baby-yoda.gif',
                  'https://c.tenor.com/B_zYdea4l-4AAAAC/yay-minions.gif',
                  'https://media1.giphy.com/media/artj92V8o75VPL7AeQ/giphy.gif',
                  'https://media2.giphy.com/media/IwAZ6dvvvaTtdI8SD5/giphy.gif'
                ];

                const getRandomGif = () => celebrationGifs[Math.floor(Math.random() * celebrationGifs.length)];

                const web_url = 'https://firstcontributions.github.io';
                const codeContributionsLink = 'https://github.com/roshanjossey/code-contributions';
                const fb_share_link = 'https://www.facebook.com/sharer/sharer.php?u=https://roshanjossey.github.io/first-contributions';
                const reddit_link = 'https://www.reddit.com/submit?url=https%3A%2F%2Fgithub.com%2Ffirstcontributions%2Ffirst-contributions';
                const linkedin_share_link = 'https://www.linkedin.com/sharing/share-offsite/?url=https://github.com/firstcontributions/first-contributions';
                const dev_share_link = "https://dev.to/new";
                const hackernews_share_link = 'https://news.ycombinator.com/submitlink';
                const bluesky_share_link = 'https://bsky.app/intent/compose?text=Yay!';
                
                const repo_logo = "https://avatars0.githubusercontent.com/u/65761570?s=88";
                const fb_logo = "https://edent.github.io/SuperTinyIcons/images/svg/facebook.svg";
                const reddit_logo = "https://edent.github.io/SuperTinyIcons/images/svg/reddit.svg";
                const linkedin_logo = "https://edent.github.io/SuperTinyIcons/images/svg/linkedin.svg";
                const dev_logo = "https://edent.github.io/SuperTinyIcons/images/svg/dev_to.svg";
                const hackernews_logo = "https://edent.github.io/SuperTinyIcons/images/svg/hackernews.svg";
                const bluesky_logo = "https://edent.github.io/SuperTinyIcons/images/svg/bluesky.svg";

                const getMergeMessage = (username) => {
                  const greeting = `Hello @${username}, congratulations! You've successfully submitted a pull request. 🎉`;
                  const starRepoMessage = `If you liked the tutorial, please star this repo!`;
                  const nextSteps = `# Next steps \n - Continue contributing: Checkout our [webapp](${web_url}).`;
                  const gif = `![celebration gif](${getRandomGif()})`;
                  return `${greeting}\n\n${starRepoMessage}\n\n${nextSteps}\n\n${gif}`;
                };

                const message = getMergeMessage(username);

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: message
                });

              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: "Something went wrong while attempting to merge this pull request."
                });
              }
            } catch (error) {
              let errMsg = "";
              console.error("Error merging pull request:", error.message);

              if (error.status === 405) {
                errMsg = `### 🛠️ Merge Conflict\nHi @${username}, another contributor edited the file at the same time! Please resolve the conflicts.`;
              } else {
                errMsg = "Something went wrong while merging the pull request.";
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: errMsg
              });

              core.setFailed(error.message);
            }

      # Handle manual reviews safely if automatic evaluation fails
      - name: Manual Review Notification
        if: steps.is_only_contributors_file_changed.outputs.only_contributors == 'false'
        uses: actions/github-script@v8
        env:
          RAW_FILES: ${{ steps.is_only_contributors_file_changed.outputs.filenames }}
          IS_MULTIPLES_LINES_CHANGES: ${{ steps.is_only_contributors_file_changed.outputs.isMultipleLineChanged }}
          IS_MULTIPLES_FILES_CHANGES: ${{ steps.is_only_contributors_file_changed.outputs.isMultipleFilesChanged }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isMultipleFilesChanged = process.env.IS_MULTIPLES_FILES_CHANGES === 'true';
            const isMultipleLinesChanged = process.env.IS_MULTIPLES_LINES_CHANGES === 'true';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const username = pr.user.login;

            let body;
            let labels = [];
            let isReviewRequired = false;

            if (isMultipleFilesChanged) {
              const filesString = process.env.RAW_FILES || "";
              const fileList = filesString
                .split(', ')
                .filter(f => f.trim() !== "")
                .map(file => `- ${file}`)
                .join('\n');

              body = `### 🌟 Hello @${username}! \n\nThank you for this contribution. Since this PR modifies files beyond \`Contributors.md\`, I've flagged this for a **manual review**. \n\nFiles changed:\n${fileList}`;
              labels = ['👩‍💻 waiting for review'];
            
            } else if (!isMultipleFilesChanged && isMultipleLinesChanged) {
              const totalChanges = pr.additions + pr.deletions;
              let diffBlock = "\n\nNo preview available.";
              
              if (totalChanges > 0 && totalChanges <= 5) {
                const { data: files } = await github.rest.pulls.listFiles({
                   owner, repo, pull_number: pr.number
                });
                const patch = files[0]?.patch ? `\`\`\`diff\n${files[0].patch}\n\`\`\`` : "_No preview available_";
                diffBlock = `\n\n**Preview of changes:**\n${patch}`;
              }
              
              body = `### 👋 Hi @${username}! \n\nLooks like there are **${totalChanges} lines of changes**. The tutorial works best when you add exactly **one line**.`;
              isReviewRequired = true;
            }

            // Fixed the typo here: context.payload.pull_request.number instead of context.payload.number
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
            });

            const botComment = comments.find(comment => comment.user.login === 'github-actions[bot]');

            if (body) {
              if (labels.length > 0) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels });
              }

              if (isReviewRequired) {
                await github.rest.pulls.createReview({ owner, repo, pull_number: pr.number, body, event: 'REQUEST_CHANGES' });
              } else if (botComment) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: botComment.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
              }
            }